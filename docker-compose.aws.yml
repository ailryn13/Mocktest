# Updated Mocktest Stack

services:
  # PostgreSQL for Mocktest
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: exam_portal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Judge0 PostgreSQL
  judge0-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
    volumes:
      - judge0data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Judge0 Redis
  judge0-redis:
    image: redis:6.0
    restart: unless-stopped

  # Judge0 Server
  judge0-server:
    image: judge0/judge0:1.13.1
    command: ["./scripts/server"]
    restart: unless-stopped
    privileged: true
    security_opt:
      - seccomp:unconfined
    pid: host
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_HOST: judge0-db
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      MAX_QUEUE_SIZE: "100"
      MAX_WALL_TIME_LIMIT: "40.0"
      MAX_MEMORY_LIMIT: "1024000"
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_started

  # Judge0 Workers
  judge0-workers:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    restart: unless-stopped
    privileged: true
    security_opt:
      - seccomp:unconfined
    pid: host
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_HOST: judge0-db
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      MAX_QUEUE_SIZE: "100"
      MAX_WALL_TIME_LIMIT: "40.0"
      MAX_MEMORY_LIMIT: "1024000"
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_started

  # Spring Boot Backend
  backend:
    image: ganesh200504/mocktest-backend:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/exam_portal_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USERNAME: ganeshkumarngk2005@gmail.com
      MAIL_PASSWORD: xkfjctziwrvcywso
      MAIL_FROM_NAME: MockTest Platform
      FRONTEND_URL: https://mock-test.duckdns.org
      CORS_ALLOWED_ORIGINS: "https://mock-test.duckdns.org,http://localhost:3000"
      APP_JWT_SECRET: bXktc3VwZXItc2VjcmV0LWtleS1mb3ItbW9ja3Rlc3QtcGxhdGZvcm0tMjAyNi1qd3Q=
      APP_JUDGE0_API_URL: http://judge0-server:2358
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      postgres:
        condition: service_healthy
      judge0-server:
        condition: service_started
    networks:
      - default

  # Next.js Frontend
  frontend:
    image: ganesh200504/mocktest-frontend:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - backend
    networks:
      - default

volumes:
  pgdata:
  judge0data:

networks:
  default: {}
