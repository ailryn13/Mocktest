# Judge0 Configuration File
JUDGE0_HTTP_PORT=2358

# Database configuration
POSTGRES_HOST=judge0-db
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0

# Redis configuration
REDIS_HOST=judge0-redis
REDIS_PORT=6379

# Security and resource limits
MAX_CPU_TIME_LIMIT=15.0
MAX_WALL_TIME_LIMIT=40.0
MAX_MEMORY_LIMIT=1048576
MAX_PROCESSES_AND_OR_THREADS=120
MAX_FILE_SIZE=1024
ENABLE_NETWORK=false
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=false
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=false

# Worker configuration
WORKERS_COUNT=1
MAX_QUEUE_SIZE=100
ENABLE_CALLBACKS=true
ENABLE_WAIT_RESULT=true

# Force Modern Isolation (Cgroup v2) - Disabled for compatibility
JUDGE0_ENABLE_CGROUP_V2=false
ISOLATE_ENABLE_CGROUP_V2=false
