# ===================================================================
#  MockTest Platform – Application Properties
# ===================================================================

# -------------------- Server --------------------
server.port=8080

# -------------------- PostgreSQL Datasource --------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/mocktest_db
spring.datasource.username=postgres
spring.datasource.password=Ailryn@2004
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------- JPA / Hibernate --------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------- JWT --------------------
app.jwt.secret=bXktc3VwZXItc2VjcmV0LWtleS1mb3ItbW9ja3Rlc3QtcGxhdGZvcm0tMjAyNi1qd3Q=
app.jwt.expiration-ms=86400000

# -------------------- CORS --------------------
# Comma-separated origin patterns allowed to call backend APIs from browsers.
# Keep localhost for local dev, and wildcard host:3000 for EC2/public access.
app.cors.allowed-origin-patterns=http://localhost:3000,http://*:3000,https://*:3000

# -------------------- Default Admin Seed --------------------
app.admin.email=admin@mocktest.com
app.admin.password=admin123
app.admin.name=Admin

# -------------------- Malpractice --------------------
app.malpractice.max-violations=3

# -------------------- Judge0 Code Execution --------------------
# Default: public Judge0 CE on RapidAPI.  Set api-key to your RapidAPI key.
# For self-hosted Judge0, change api-url and leave api-key blank.
app.judge0.api-url=https://judge0-ce.p.rapidapi.com
app.judge0.api-key=
