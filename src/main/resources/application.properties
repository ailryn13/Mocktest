# ===================================================================
#  MockTest Platform – Application Properties
# ===================================================================

# -------------------- Server --------------------
server.port=8080
logging.level.org.springframework.web=DEBUG
logging.level.com.mocktest=DEBUG

# -------------------- PostgreSQL Datasource --------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/mocktest_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Ailryn@2004}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------- JPA / Hibernate --------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# -------------------- JWT --------------------
app.jwt.secret=${APP_JWT_SECRET:bXktc3VwZXItc2VjcmV0LWtleS1mb3ItbW9ja3Rlc3QtcGxhdGZvcm0tMjAyNi1qd3Q=}
app.jwt.expiration-ms=86400000

# -------------------- CORS --------------------
# Comma-separated origin patterns allowed to call backend APIs from browsers.
# Keep localhost for local dev, and wildcard host:3000 for EC2/public access.
app.cors.allowed-origin-patterns=http://localhost:3000,http://*:3000,https://*:3000,https://mock-test.duckdns.org,http://mock-test.duckdns.org

# -------------------- Default Admin Seed --------------------
app.admin.email=admin@mocktest.com
app.admin.password=admin123
app.admin.name=Admin

# -------------------- Default Super Admin Seed --------------------
app.superadmin.email=superadmin@mocktest.app
app.superadmin.password=SuperAdmin@123456
app.superadmin.name=Super Admin

# -------------------- Malpractice --------------------
app.malpractice.max-violations=3

# -------------------- Judge0 Code Execution --------------------
# Self-hosted Judge0 CE running on the same EC2 (no rate limit, no API key).
app.judge0.api-url=${APP_JUDGE0_API_URL:http://judge0-server:2358}
app.judge0.api-key=${APP_JUDGE0_API_KEY:}

# -------------------- Mail / Password Reset --------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:ganeshkumarngk2005@gmail.com}
spring.mail.password=${MAIL_PASSWORD:xkfjctziwrvcywso}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.mail.from-name=${MAIL_FROM_NAME:MockTest Platform}
app.frontend-url=${FRONTEND_URL:https://mock-test.duckdns.org}
app.password-reset-token-expiry-hours=1

# -------------------- Flyway (DB Migrations) --------------------
# Baseline-on-migrate allows Flyway to work with an existing schema
# created by Hibernate ddl-auto. V1 only adds RLS policies.
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
