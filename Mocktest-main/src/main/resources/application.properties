app.admin.name=Admin

# -------------------- Malpractice --------------------
app.malpractice.max-violations=3

# -------------------- Judge0 Code Execution --------------------
# Default: public Judge0 CE on RapidAPI.  Set api-key to your RapidAPI key.
# For self-hosted Judge0, change api-url and leave api-key blank.
app.judge0.api-url=https://judge0-ce.p.rapidapi.com
app.judge0.api-key=

