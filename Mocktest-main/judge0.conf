# ===========================================================
#  Judge0 CE – Configuration
#  Used by judge0-server and judge0-workers services.
# ===========================================================

# --- PostgreSQL (judge0's own DB) ---
POSTGRES_HOST=judge0-db
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0pass

# --- Redis ---
REDIS_HOST=judge0-redis
REDIS_PORT=6379

# --- Security (change in production) ---
AUTH_TOKEN=judge0localtoken
AUTHN_HEADER=X-Auth-Token

# --- Workers ---
COUNT_WORKERS=2
INTERVAL=0.1
WAIT_TIME_BEFORE_RESTART=10

# --- Limits ---
CPU_TIME_LIMIT=10
CPU_EXTRA_TIME=2
WALL_TIME_LIMIT=20
# JVM needs large virtual address space – set high so RLIMIT_AS doesn't kill it
MEMORY_LIMIT=8000000
MAX_MEMORY_LIMIT=8000000
STACK_LIMIT=128000
MAX_PROCESSES_AND_OR_THREADS=120
# Both MUST be true → isolate uses rlimit (no cgroup v1 needed on this host)
ENABLE_PER_PROCESS_AND_THREAD_TIME_LIMIT=true
ENABLE_PER_PROCESS_AND_THREAD_MEMORY_LIMIT=true
MAX_FILE_SIZE=1024
NUMBER_OF_RUNS=1

# --- Network ---
ENABLE_NETWORK=false
