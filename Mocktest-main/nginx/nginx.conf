# ===========================================================
#  Nginx – Reverse-proxy for MockTest (EC2 production)
#
#  Routes:
#    /api/*  →  Spring Boot backend  (port 8080)
#    /*      →  Next.js frontend     (port 3000)
# ===========================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # --- gzip compression ---
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/x-font-ttf
                      image/svg+xml;

    # --- upstream definitions ---
    upstream backend {
        server backend:8080;
    }

    upstream frontend {
        server frontend:3000;
    }

    # ===========================================================
    #  HTTP  →  redirect to HTTPS when certs are present,
    #            otherwise serve directly (for plain HTTP setups)
    # ===========================================================
    server {
        listen 80;
        server_name _;

        # Uncomment the block below and comment out the location blocks
        # to force HTTPS after you've set up TLS certificates:
        #
        # return 301 https://$host$request_uri;

        # --- Backend API ---
        location /api/ {
            proxy_pass         http://backend/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # --- WebSocket support (if used) ---
        location /ws/ {
            proxy_pass         http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # --- Next.js (catch-all) ---
        location / {
            proxy_pass         http://frontend/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }

    # ===========================================================
    #  HTTPS  (enable when TLS certificates are placed in
    #          ./nginx/certs/ as fullchain.pem and privkey.pem)
    # ===========================================================
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #
    #     location /api/ {
    #         proxy_pass       http://backend/api/;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    #
    #     location / {
    #         proxy_pass       http://frontend/;
    #         proxy_set_header Host              $host;
    #         proxy_set_header X-Forwarded-Proto https;
    #     }
    # }
}
