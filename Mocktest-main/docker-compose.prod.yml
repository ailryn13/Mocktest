# ===========================================================
#  Docker Compose – PRODUCTION (EC2 / AWS)
#
#  Usage:
#    cp .env.production.example .env.production
#    # fill in .env.production
#    docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
# ===========================================================

services:

  # ─────────────── PostgreSQL ────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed externally – only reachable inside the Docker network

  # ─────────────── Spring Boot Backend ───────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    expose:
      - "8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET:         ${JWT_SECRET}
      MAIL_HOST:          ${MAIL_HOST}
      MAIL_PORT:          ${MAIL_PORT}
      MAIL_USERNAME:      ${MAIL_USERNAME}
      MAIL_PASSWORD:      ${MAIL_PASSWORD}
      MAIL_FROM_NAME:     ${MAIL_FROM_NAME}
      FRONTEND_URL:       ${FRONTEND_URL}
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M

  # ─────────────── Next.js Frontend ─────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Requests to /api are proxied by Nginx → backend; no direct URL needed
        NEXT_PUBLIC_API_URL: /api
    restart: always
    expose:
      - "3000"
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

  # ─────────────── Nginx Reverse-Proxy ───────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # mount TLS certs if available
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
