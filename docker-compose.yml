# ===========================================================
#  Docker Compose – MockTest Platform
# ===========================================================

services:

  # ==================== JUDGE0 CE (Code Sandbox) ====================

  # Judge0's own PostgreSQL database
  judge0-db:
    image: postgres:13
    restart: unless-stopped
    env_file: judge0.conf
    volumes:
      - judge0data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Judge0's own Redis instance
  judge0-redis:
    image: redis:6.0
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Judge0 API server
  judge0-server:
    image: judge0/judge0:1.13.1
    command: ["./scripts/server"]
    restart: unless-stopped
    # No host port needed – backend calls judge0-server via Docker internal network
    privileged: true
    env_file: judge0.conf
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_started

  # Judge0 background workers (actually execute the code)
  judge0-workers:
    image: judge0/judge0:1.13.1
    restart: unless-stopped
    command: ["./scripts/workers"]
    privileged: true
    env_file: judge0.conf
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_started

  # ==================== MOCKTEST PLATFORM ====================

  # -------------------- PostgreSQL --------------------
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mocktest_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------- Spring Boot Backend --------------------
  backend:
    build: .
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mocktest_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: ${MAIL_USERNAME:-ganeshkumarngk2005@gmail.com}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-xkfjctziwrvcywso}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-MockTest Platform}
      FRONTEND_URL: ${FRONTEND_URL:-https://mock-test.duckdns.org}
      APP_JWT_SECRET: ${JWT_SECRET:-bXktc3VwZXItc2VjcmV0LWtleS1mb3ItbW9ja3Rlc3QtcGxhdGZvcm0tMjAyNi1qd3Q=}
      # Judge0 CE running as a local service in this compose stack
      APP_JUDGE0_API_URL: ${JUDGE0_API_URL:-http://judge0-server:2358}  # internal Docker network port stays 2358
      APP_JUDGE0_API_KEY: "${JUDGE0_API_KEY:-}"
    depends_on:
      postgres:
        condition: service_healthy
      judge0-server:
        condition: service_started
    networks:
      - default

  # -------------------- Next.js Frontend --------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-}"
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  judge0data:

networks:
  default: {}
