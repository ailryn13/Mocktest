version: '3.8'

services:
  # ==================== JUDGE0 CE (Code Sandbox) ====================

  # Judge0 Database
  judge0-db:
    image: postgres:15-alpine
    container_name: judge0-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: judge0
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - judge0data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Judge0 Redis
  judge0-redis:
    image: redis:6.0
    container_name: judge0-redis
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Judge0 API Server
  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: judge0-server
    command: ["./scripts/server"]
    restart: unless-stopped
    privileged: true
    security_opt:
      - seccomp:unconfined
    pid: host
    env_file: judge0.conf
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_started

  # Judge0 Workers
  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: judge0-workers
    restart: unless-stopped
    command: ["./scripts/workers"]
    privileged: true
    security_opt:
      - seccomp:unconfined
    pid: host
    env_file: judge0.conf
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_started

  # ==================== MOCKTEST PLATFORM ====================

  # Main Application Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: exam_portal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot Backend
  backend:
    image: ganesh200504/mocktest-backend:latest
    container_name: mocktest-backend
    restart: unless-stopped
    ports:
      - "9090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/exam_portal_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: "587"
      MAIL_USERNAME: ganeshkumarngk2005@gmail.com
      MAIL_PASSWORD: xkfjctziwrvcywso
      FRONTEND_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      JWT_SECRET: bXktc3VwZXItc2VjcmV0LWtleS1mb3ItbW9ja3Rlc3QtcGxhdGZvcm0tMjAyNi1qd3Q=
      APP_JUDGE0_API_URL: http://judge0-server:2358
      JAVA_OPTS: "-Xmx512m -Xms256m"
    depends_on:
      postgres:
        condition: service_healthy
      judge0-server:
        condition: service_started

  # Next.js Frontend
  frontend:
    image: ganesh200504/mocktest-frontend:latest
    container_name: mocktest-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9090
    depends_on:
      - backend

volumes:
  pgdata:
  judge0data: