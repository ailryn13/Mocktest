version: '3.8'

services:

  # ==================== JUDGE0 CE (Code Sandbox) ====================

  judge0-db:
    image: postgres:13
    restart: unless-stopped
    env_file: judge0.conf
    volumes:
      - judge0data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0"]
      interval: 5s
      timeout: 5s
      retries: 10

  judge0-redis:
    image: redis:6.0
    restart: unless-stopped
    command: redis-server --appendonly yes

  judge0-server:
    image: judge0/judge0:1.13.1
    command: ["./scripts/server"]
    restart: unless-stopped
    privileged: true
    env_file: judge0.conf
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_started

  judge0-workers:
    image: judge0/judge0:1.13.1
    restart: unless-stopped
    command: ["./scripts/workers"]
    privileged: true
    env_file: judge0.conf
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_started

  # ==================== MOCKTEST PLATFORM ====================

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-mocktest_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: exam-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME:-mocktest_db}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-postgres}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-ganeshkumarngk2005@gmail.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-xkfjctziwrvcywso}
      - FRONTEND_URL=${FRONTEND_URL}
      - APP_JWT_SECRET=${JWT_SECRET}
      - APP_JUDGE0_API_URL=http://judge0-server:2358
    depends_on:
      postgres:
        condition: service_healthy
      judge0-server:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: exam-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
    depends_on:
      - backend

volumes:
  pgdata:
  judge0data:
