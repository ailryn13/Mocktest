version: '3.8'

services:
  backend:
    build: ./backend
    image: ganesh200504/mocktest-backend:latest
    container_name: exam-portal-backend
    ports:
      - "9090:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/exam_portal_db
      - SPRING_DATASOURCE_USERNAME=exam_admin
      - SPRING_DATASOURCE_PASSWORD=ExamPortal2024
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=exam_user
      - SPRING_RABBITMQ_PASSWORD=exam_password
      - SPRING_RABBITMQ_VIRTUAL_HOST=exam_vhost
      - MINIO_ENDPOINT=http://minio:9000
      - JWT_SECRET=YourSuperSecretKeyForJWTTokenGenerationMustBe256BitsOrMore
      - SPRING_PROFILES_ACTIVE=cloud
      - CORS_ALLOWED_ORIGINS=https://mock-test.duckdns.org
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
      minio: { condition: service_healthy }
    networks: [exam-network]
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: exam-portal-frontend:latest
    container_name: exam-portal-frontend
    ports:
      - "3000:80"
    depends_on: [backend]
    networks: [exam-network]
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: exam-portal-postgres
    environment:
      POSTGRES_DB: exam_portal_db
      POSTGRES_USER: exam_admin
      POSTGRES_PASSWORD: ExamPortal2024
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam_admin"]
      interval: 10s
    networks: [exam-network]

  redis:
    image: redis:7-alpine
    container_name: exam-portal-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    networks: [exam-network]

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: exam-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: exam_user
      RABBITMQ_DEFAULT_PASS: exam_password
      RABBITMQ_DEFAULT_VHOST: exam_vhost
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
    networks: [exam-network]

  minio:
    image: minio/minio
    container_name: exam-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
    networks: [exam-network]

  createbuckets:
    image: minio/mc
    depends_on:
      minio: { condition: service_healthy }
    entrypoint: >
      /bin/sh -c "/usr/bin/mc config host add myminio http://minio:9000 minioadmin minioadmin; /usr/bin/mc mb myminio/test-cases; /usr/bin/mc anonymous set public myminio/test-cases; exit 0;"
    networks: [exam-network]

networks:
  exam-network:
    driver: bridge
