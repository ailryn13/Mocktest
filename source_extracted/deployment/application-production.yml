# Production Configuration for GCP VM Deployment
server:
  port: 8080
  address: 0.0.0.0  # Listen on all interfaces

spring:
  application:
    name: exam-portal-backend
  
  main:
    allow-bean-definition-overriding: true

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/exam_portal_db
    username: exam_admin
    password: SecurePassword123!
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: ExamPortalHikariPool

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2

  # RabbitMQ Configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: exam_user
    password: exam_password
    virtual-host: exam_vhost

# Actuator - Disable mail health check
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false

# CORS Configuration - Allow your external IP
cors:
  allowed:
    origins: http://34.180.47.20:3000,http://localhost:3000

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyForJWTTokenGenerationMustBe256BitsOrMore}
  expiration: 86400000

# Logging
logging:
  level:
    root: INFO
    com.examportal: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
  file:
    name: logs/exam-portal.log
